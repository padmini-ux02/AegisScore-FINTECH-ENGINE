version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: creditguard-db
    environment:
      POSTGRES_USER: creditguard_user
      POSTGRES_PASSWORD: creditguard_password
      POSTGRES_DB: creditguard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditguard_user -d creditguard_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: creditguard-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://creditguard_user:creditguard_password@db:5432/creditguard_db
      - SECRET_KEY=prod-secret-change-me-in-production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../ml/models:/app/ml/models

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: creditguard-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: creditguard-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: creditguard-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data:
